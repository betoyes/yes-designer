<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Editor de Carrossel</title>
<style id="fonts">/*__FONTS__*/</style>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{background:#1b1b1f;color:#eee;font-family:system-ui,sans-serif;}
#bar{position:sticky;top:0;z-index:50;display:flex;gap:10px;flex-wrap:wrap;align-items:center;
  background:#121214;border-bottom:1px solid #2a2a2e;padding:12px 16px;}
#bar b{font-size:14px;margin-right:8px;}
.btn{background:#2a2a30;color:#fff;border:1px solid #3a3a42;border-radius:9px;padding:9px 14px;font-size:13px;cursor:pointer;}
.btn:hover{background:#34343c;}
.btn.primary{background:#7C5CFF;border-color:#7C5CFF;}
.hint{font-size:12px;color:#9a9aa2;margin-left:auto;max-width:340px;}
label.inline{font-size:12px;color:#bdbdc6;display:flex;align-items:center;gap:6px;}
#stage{display:flex;flex-direction:column;align-items:center;gap:28px;padding:28px 16px 140px;}
.wrap{position:relative;border-radius:10px;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.5);}
.wrap.active{outline:3px solid #7C5CFF;outline-offset:6px;}
.slide{position:relative;overflow:hidden;text-align:left;transform-origin:top left;}
.slide *{text-align:left;}
.ed{cursor:grab;outline:1px dashed transparent;}
.ed:hover{outline-color:rgba(124,92,255,.6);}
.ed.sel{outline:2px solid #7C5CFF;}
.ed[contenteditable="true"]{cursor:text;outline:2px solid #7C5CFF;}
body.exporting .ed{outline:none!important;}
body.exporting .wrap.active{outline:none!important;}
.content{position:absolute;left:96px;right:96px;bottom:96px;display:flex;flex-direction:column;}
.kicker{font-family:var(--f-mono);font-size:30px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:28px;}
.h1{font-family:var(--f-display);font-size:120px;line-height:.98;letter-spacing:-.02em;}
.h2{font-family:var(--f-display);font-size:84px;line-height:1.02;letter-spacing:-.01em;}
.sub{font-family:var(--f-body);font-size:40px;line-height:1.35;color:var(--muted);margin-top:36px;}
.body{font-family:var(--f-body);font-size:42px;line-height:1.4;margin-top:32px;}
.ghost{position:absolute;top:64px;left:96px;font-family:var(--f-display);font-size:300px;line-height:1;color:transparent;-webkit-text-stroke:2px var(--surface);}
.idx{position:absolute;top:96px;right:96px;font-family:var(--f-mono);font-size:30px;color:var(--muted);}
.rule{width:96px;height:8px;background:var(--accent);margin-bottom:40px;}
.quote{font-family:var(--f-serif);font-size:76px;line-height:1.15;font-style:italic;}
.source{font-family:var(--f-mono);font-size:30px;color:var(--muted);margin-top:40px;}
.stat{font-family:var(--f-display);font-size:280px;line-height:.9;color:var(--accent);}
.rotulo{font-size:48px;margin-top:8px;}
.cta{font-family:var(--f-display);font-size:96px;line-height:1.02;}
.acao{display:inline-block;align-self:flex-start;margin-top:48px;background:var(--accent);color:var(--bg);font-family:var(--f-mono);font-size:34px;padding:28px 44px;border-radius:14px;text-transform:uppercase;letter-spacing:.06em;}
.itens{list-style:none;margin-top:24px;}
.itens li{font-family:var(--f-body);font-size:44px;line-height:1.3;padding:26px 0;border-bottom:2px solid var(--surface);}
.itens li::before{content:"\2192";color:var(--accent);font-family:var(--f-mono);margin-right:24px;}
.handle{position:absolute;left:96px;bottom:64px;font-family:var(--f-mono);font-size:30px;color:var(--muted);}
.logo{object-fit:contain;}
.has-bg .ed{text-shadow:0 2px 24px rgba(0,0,0,.6);}
#panel{position:fixed;right:16px;bottom:16px;width:300px;background:#16161a;border:1px solid #2c2c33;border-radius:14px;padding:16px;z-index:60;display:none;}
#panel.show{display:block;}
#panel h4{font-size:13px;margin-bottom:12px;color:#cfcfd6;}
#panel .row{margin-bottom:14px;}
#panel .row>label{display:block;font-size:12px;color:#9a9aa2;margin-bottom:6px;}
#panel input[type=range]{width:100%;}
#panel .small{font-size:11px;color:#73737c;line-height:1.4;}
.filerow{display:flex;gap:8px;}
.filerow .btn{flex:1;text-align:center;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="bar">
  <b>Editor de Carrossel</b>
  <button class="btn" id="addText">+ Texto</button>
  <label class="inline">Acento <input type="color" id="accent" value="#7C5CFF"></label>
  <button class="btn" id="reset">Resetar</button>
  <button class="btn primary" id="export">&#11015; Exportar PNGs</button>
  <span class="hint">Clique num slide pra editar fundo/overlay &middot; arraste os textos pra mover &middot; 2 cliques pra editar o texto</span>
</div>
<div id="stage"></div>

<div id="panel">
  <h4>Slide <span id="pIdx">1</span></h4>
  <div class="row">
    <label>Imagem de fundo</label>
    <div class="filerow">
      <button class="btn" id="pBgBtn">Escolher</button>
      <button class="btn" id="pBgClear">Remover</button>
    </div>
    <input type="file" id="pBgFile" accept="image/*" style="display:none">
  </div>
  <div class="row">
    <label>Escurecer fundo: <span id="pOvVal">55%</span></label>
    <input type="range" id="pOverlay" min="0" max="100" value="55">
  </div>
  <div class="row"><label class="inline"><input type="checkbox" id="pBreather"> fundo claro (respiro)</label></div>
  <div class="small">Selecione um texto e arraste pra mover. Dois cliques pra editar o conteudo.</div>
</div>

<script>
const CONFIG = /*__CONFIG__*/{};
const stage=document.getElementById('stage');
const W=CONFIG.w, H=CONFIG.h, total=CONFIG.slides.length;
const SCALE=Math.min(540,(window.innerWidth-48))/W;

const root=document.documentElement.style, pal=CONFIG.palette;
root.setProperty('--bg',pal.bg);root.setProperty('--fg',pal.fg);root.setProperty('--muted',pal.muted);
root.setProperty('--accent',pal.accent);root.setProperty('--surface',pal.surface);root.setProperty('--cream',pal.cream);
root.setProperty('--f-display',"'"+CONFIG.fonts.display+"',system-ui,sans-serif");
root.setProperty('--f-body',"'"+CONFIG.fonts.body+"',system-ui,sans-serif");
root.setProperty('--f-mono',"'"+CONFIG.fonts.mono+"',ui-monospace,monospace");
root.setProperty('--f-serif',"'"+CONFIG.fonts.serif+"',Georgia,serif");
document.getElementById('accent').value=pal.accent;

const state=CONFIG.slides.map(s=>({bg:s.bg_uri||null,overlay:(CONFIG.bg_overlay!=null?CONFIG.bg_overlay:0.55),breather:!!s.breather}));
let activeSlide=-1, sel=null;
const px=n=>n+'px';
const esc=s=>(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function el(cls,html){const d=document.createElement('div');d.className=cls;if(html!=null)d.innerHTML=html;return d;}

// monta o slide em FLUXO (sem sobreposição); depois "congelamos" em coordenadas
function buildSlide(s,i){
  const wrap=el('wrap');wrap.dataset.i=i;
  const slide=el('slide');slide.id='slide-'+i;
  slide.style.width=px(W);slide.style.height=px(H);
  applyBg(slide,i);
  const t=s.tipo||'passo', num=String(i+1).padStart(2,'0');

  let gv=s.ghost; if(gv==null&&s.n!=null)gv=s.n;
  if(gv && !(t==='capa'&&CONFIG.logo&&CONFIG.logo.pos==='capa') && !state[i].bg){
    slide.appendChild(el('ed ghost',esc(typeof gv==='string'?gv:num)));
  }
  if(t!=='capa'&&t!=='cta'){ slide.appendChild(el('ed idx',num+'/'+String(total).padStart(2,'0'))); }

  const content=el('content');
  if(t==='capa'){
    content.style.bottom='150px';
    if(CONFIG.logo&&CONFIG.logo.pos==='capa')addLogo(slide,'capa');
    if(s.kicker)content.appendChild(el('ed kicker',esc(s.kicker)));
    content.appendChild(el('ed h1',esc(s.titulo||'Título')));
    if(s.sub)content.appendChild(el('ed sub',esc(s.sub)));
    if(CONFIG.handle)slide.appendChild(el('ed handle',esc(CONFIG.handle)));
  }else if(t==='insight'){
    content.appendChild(el('rule',''));
    content.appendChild(el('ed quote',esc(s.texto||'')));
    if(s.fonte)content.appendChild(el('ed source',esc(s.fonte)));
  }else if(t==='lista'){
    content.appendChild(el('ed h2',esc(s.titulo||'')));
    let lis='';(s.itens||[]).forEach(x=>lis+='<li>'+esc(x)+'</li>');
    content.appendChild(el('ed itens','<ul class="itens" style="list-style:none">'+lis.replace(/<li>/g,'<li style="font-family:var(--f-body);font-size:44px;line-height:1.3;padding:26px 0;border-bottom:2px solid var(--surface)">&#8594; ')+'</ul>'));
  }else if(t==='stat'){
    content.appendChild(el('ed stat',esc(s.numero||'')));
    if(s.rotulo)content.appendChild(el('ed rotulo',esc(s.rotulo)));
    if(s.corpo)content.appendChild(el('ed body',esc(s.corpo)));
  }else if(t==='cta'){
    content.appendChild(el('ed cta',esc(s.titulo||'')));
    if(s.sub)content.appendChild(el('ed sub',esc(s.sub)));
    if(s.acao)content.appendChild(el('ed acao',esc(s.acao)));
  }else{
    content.appendChild(el('rule',''));
    content.appendChild(el('ed h2',esc(s.titulo||'Título')));
    if(s.corpo)content.appendChild(el('ed body',esc(s.corpo)));
  }
  slide.appendChild(content);
  if(t!=='capa'&&CONFIG.logo&&CONFIG.logo.pos==='todos')addLogo(slide,'mark');
  wrap.appendChild(slide);
  wrap.addEventListener('mousedown',()=>setActive(i));
  stage.appendChild(wrap);
}

function addLogo(slide,kind){
  const img=document.createElement('img');img.className='ed logo';img.src=CONFIG.logo.uri;img.crossOrigin='anonymous';
  const h=kind==='capa'?CONFIG.logo.h_capa:CONFIG.logo.h_mark;img.style.height=px(h);
  img.style.position='absolute';
  if(kind==='capa'){img.style.left=px(96);img.style.top=px(88);}else{img.style.left=px(W-96-220);img.style.top=px(H-60-h);}
  slide.appendChild(img);
}

// converte cada .ed (e a rule) para posição absoluta medida — vira arrastável sem sobrepor
function freeze(slide){
  const sr=slide.getBoundingClientRect();
  const movers=[...slide.querySelectorAll('.ed, .rule')];
  const data=movers.map(e=>{const r=e.getBoundingClientRect();return {e,left:r.left-sr.left,top:r.top-sr.top,w:r.width};});
  data.forEach(d=>{
    d.e.style.position='absolute';d.e.style.left=px(Math.round(d.left));d.e.style.top=px(Math.round(d.top));
    if(d.e.tagName!=='IMG'&&!d.e.classList.contains('rule'))d.e.style.width=px(Math.round(d.w));
    slide.appendChild(d.e);
    if(!d.e.classList.contains('ed'))d.e.classList.add('ed'); // a rule também vira arrastável
    makeInteractive(d.e);
  });
  const c=slide.querySelector('.content');if(c)c.remove();
}

function applyBg(slide,i){
  const st=state[i];
  if(st.bg){const o=st.overlay;
    slide.style.background='linear-gradient(to top,rgba(0,0,0,'+o+'),rgba(0,0,0,'+(o*0.5)+') 55%,rgba(0,0,0,'+(o*0.15)+') 100%),url('+st.bg+') center/cover';
    slide.classList.add('has-bg');slide.style.color='var(--fg)';
  }else{slide.style.background=st.breather?'var(--cream)':'var(--bg)';slide.classList.remove('has-bg');slide.style.color=st.breather?'#111':'var(--fg)';}
}

function makeInteractive(e){
  let drag=null;
  e.addEventListener('pointerdown',ev=>{
    if(e.getAttribute('contenteditable')==='true')return;
    ev.stopPropagation();select(e);
    drag={x0:ev.clientX,y0:ev.clientY,left:parseFloat(e.style.left)||0,top:parseFloat(e.style.top)||0};
    e.setPointerCapture(ev.pointerId);e.style.cursor='grabbing';
  });
  e.addEventListener('pointermove',ev=>{if(!drag)return;
    e.style.left=px(Math.round(drag.left+(ev.clientX-drag.x0)/SCALE));
    e.style.top=px(Math.round(drag.top+(ev.clientY-drag.y0)/SCALE));});
  e.addEventListener('pointerup',()=>{drag=null;e.style.cursor='grab';});
  e.addEventListener('dblclick',ev=>{if(e.tagName==='IMG'||e.classList.contains('rule'))return;ev.stopPropagation();e.setAttribute('contenteditable','true');e.focus();});
  e.addEventListener('blur',()=>e.removeAttribute('contenteditable'));
}

function select(e){if(sel)sel.classList.remove('sel');sel=e;e.classList.add('sel');}
function setActive(i){
  if(activeSlide>=0){const w=stage.querySelector('.wrap[data-i="'+activeSlide+'"]');if(w)w.classList.remove('active');}
  activeSlide=i;const w=stage.querySelector('.wrap[data-i="'+i+'"]');if(w)w.classList.add('active');
  document.getElementById('panel').classList.add('show');
  document.getElementById('pIdx').textContent=i+1;
  document.getElementById('pOverlay').value=Math.round(state[i].overlay*100);
  document.getElementById('pOvVal').textContent=Math.round(state[i].overlay*100)+'%';
  document.getElementById('pBreather').checked=state[i].breather;
}

document.getElementById('pBgBtn').onclick=()=>document.getElementById('pBgFile').click();
document.getElementById('pBgFile').onchange=function(){const f=this.files[0];if(!f||activeSlide<0)return;
  const rd=new FileReader();rd.onload=e=>{state[activeSlide].bg=e.target.result;applyBg(document.getElementById('slide-'+activeSlide),activeSlide);};rd.readAsDataURL(f);};
document.getElementById('pBgClear').onclick=()=>{if(activeSlide<0)return;state[activeSlide].bg=null;applyBg(document.getElementById('slide-'+activeSlide),activeSlide);};
document.getElementById('pOverlay').oninput=function(){if(activeSlide<0)return;state[activeSlide].overlay=this.value/100;document.getElementById('pOvVal').textContent=this.value+'%';applyBg(document.getElementById('slide-'+activeSlide),activeSlide);};
document.getElementById('pBreather').onchange=function(){if(activeSlide<0)return;state[activeSlide].breather=this.checked;applyBg(document.getElementById('slide-'+activeSlide),activeSlide);};
document.getElementById('accent').oninput=function(){root.setProperty('--accent',this.value);};
document.getElementById('reset').onclick=()=>{if(confirm('Recarregar e desfazer as mudancas?'))location.reload();};
document.getElementById('addText').onclick=()=>{if(activeSlide<0){alert('Clique num slide primeiro.');return;}
  const slide=document.getElementById('slide-'+activeSlide);const n=el('ed body','Novo texto');
  n.style.position='absolute';n.style.left=px(96);n.style.top=px(400);n.style.width=px(W-192);slide.appendChild(n);makeInteractive(n);select(n);};

document.getElementById('export').onclick=async function(){
  this.disabled=true;const lbl=this.textContent;this.textContent='Exportando...';
  document.body.classList.add('exporting');if(sel)sel.classList.remove('sel');
  for(let i=0;i<total;i++){
    const slide=document.getElementById('slide-'+i);const prev=slide.style.transform;slide.style.transform='none';
    const c=await html2canvas(slide,{scale:2,useCORS:true,backgroundColor:null,width:W,height:H,windowWidth:W,windowHeight:H});
    slide.style.transform=prev;
    const a=document.createElement('a');a.download='slide-'+String(i+1).padStart(2,'0')+'.png';a.href=c.toDataURL('image/png');a.click();
    await new Promise(r=>setTimeout(r,250));
  }
  document.body.classList.remove('exporting');this.disabled=false;this.textContent=lbl;
};

// 1) monta em fluxo  2) congela em coordenadas  3) aplica a escala de visualização
CONFIG.slides.forEach(buildSlide);
requestAnimationFrame(()=>{
  document.querySelectorAll('.slide').forEach(freeze);
  document.querySelectorAll('.wrap').forEach(w=>{w.style.width=px(W*SCALE);w.style.height=px(H*SCALE);});
  document.querySelectorAll('.slide').forEach(s=>{s.style.transform='scale('+SCALE+')';});
});
</script>
</body>
</html>
