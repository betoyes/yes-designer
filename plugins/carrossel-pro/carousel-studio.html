<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Carousel Studio — Editor de Carrosséis</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{
  --bg:#E9E1D2; --fg:#1B1714; --muted:#6E6357;
  --accent:#BE4D2E; --surface:#1B1714; --cream:#F7F2E8;
  --f-display:'Anton',system-ui,sans-serif;
  --f-body:'Inter',system-ui,sans-serif;
  --f-mono:'JetBrains Mono',ui-monospace,monospace;
  --f-serif:'Instrument Serif',Georgia,serif;
}
.slide{width:1080px;height:1350px;background:var(--bg);color:var(--fg);
  position:relative;overflow:hidden;display:flex;flex-direction:column;
  justify-content:flex-end;align-items:flex-start;padding:96px;text-align:left;box-sizing:border-box;
  font-family:var(--f-body);}
.slide *{box-sizing:border-box;}
.slide .kicker{font-family:var(--f-mono);font-size:30px;letter-spacing:.18em;
  text-transform:uppercase;color:var(--accent);margin-bottom:28px;}
.slide .h1{font-family:var(--f-display);font-size:120px;line-height:.98;
  letter-spacing:-.02em;text-transform:none;}
.slide .h2{font-family:var(--f-display);font-size:84px;line-height:1.02;letter-spacing:-.01em;}
.slide .sub{font-size:40px;line-height:1.35;color:var(--muted);margin-top:36px;max-width:84%;}
.slide .body{font-size:42px;line-height:1.4;color:var(--fg);margin-top:32px;max-width:88%;}
.slide .ghost{position:absolute;top:64px;left:96px;font-family:var(--f-display);
  font-size:300px;line-height:1;color:transparent;-webkit-text-stroke:2px var(--surface);z-index:0;}
.slide .idx{position:absolute;top:96px;right:96px;font-family:var(--f-mono);font-size:30px;
  color:var(--muted);z-index:2;}
.slide .content{position:relative;z-index:1;max-width:100%;}
.slide .rule{width:96px;height:8px;background:var(--accent);margin-bottom:40px;}
.slide .quote{font-family:var(--f-serif);font-size:76px;line-height:1.15;font-style:italic;}
.slide .source{font-family:var(--f-mono);font-size:30px;color:var(--muted);margin-top:40px;}
.slide ul.itens{list-style:none;margin-top:24px;padding:0;}
.slide ul.itens li{font-size:44px;line-height:1.3;padding:28px 0;
  border-bottom:2px solid var(--surface);display:flex;gap:28px;}
.slide ul.itens li::before{content:"→";color:var(--accent);font-family:var(--f-mono);}
.slide .stat{font-family:var(--f-display);font-size:280px;line-height:.9;color:var(--accent);}
.slide .rotulo{font-size:48px;margin-top:8px;}
.slide .cta{font-family:var(--f-display);font-size:96px;line-height:1.02;}
.slide .acao{display:inline-block;margin-top:48px;background:var(--accent);color:var(--bg);
  font-family:var(--f-mono);font-size:34px;padding:28px 44px;border-radius:14px;
  text-transform:uppercase;letter-spacing:.06em;}
.slide .handle{position:absolute;bottom:64px;left:96px;font-family:var(--f-mono);
  font-size:30px;color:var(--muted);z-index:2;}
.slide.breather{background:var(--cream);color:#111;}
.slide.breather .kicker{color:var(--accent);}
.slide.breather .sub,.slide.breather .source,.slide.breather .rotulo{color:#555;}
.slide .bgshade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.15),rgba(0,0,0,.6));z-index:0;}
.slide.has-bg{color:#fff;}
.slide.has-bg .sub,.slide.has-bg .source,.slide.has-bg .rotulo,.slide.has-bg .idx,.slide.has-bg .handle{color:#e8e8e8;}
*{box-sizing:border-box;}
html,body{margin:0;height:100%;background:#15151a;color:#e7e7ea;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
#app{display:flex;flex-direction:column;height:100vh;}
header{display:flex;align-items:center;gap:14px;flex-wrap:wrap;background:#0f0f13;border-bottom:1px solid #26262e;padding:10px 16px;z-index:10;}
header .brand{font-weight:800;letter-spacing:.02em;color:#fff;font-size:15px;}
header .brand b{color:#6C5CE7;}
header .sep{width:1px;height:26px;background:#2c2c36;}
.btn{background:#22222b;color:#e7e7ea;border:1px solid #34343f;border-radius:9px;padding:8px 13px;font-size:13px;cursor:pointer;font-weight:600;display:inline-flex;gap:7px;align-items:center;}
.btn:hover{background:#2c2c38;}
.btn.primary{background:#6C5CE7;border-color:#6C5CE7;color:#fff;}
.btn.primary:hover{background:#5a4bd6;}
.btn:disabled{opacity:.55;cursor:wait;}
.swatch{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:#b9b9c2;}
.swatch input[type=color]{width:30px;height:26px;border:1px solid #34343f;border-radius:6px;background:none;padding:0;cursor:pointer;}
header .grow{flex:1;}
.main{flex:1;display:grid;grid-template-columns:166px 1fr 360px;min-height:0;}
.rail{background:#101015;border-right:1px solid #23232b;overflow-y:auto;padding:14px 10px 14px 14px;scrollbar-gutter:stable;}
.thumb{position:relative;width:128px;height:160px;border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;margin:0 auto 12px;background:#000;}
.thumb.active{border-color:#6C5CE7;}
.thumb .scaler{position:absolute;top:0;left:0;transform-origin:top left;}
.thumb .tnum{position:absolute;top:4px;left:6px;font-size:11px;font-weight:700;color:#fff;background:rgba(0,0,0,.5);padding:1px 6px;border-radius:5px;z-index:5;}
.stage{display:flex;align-items:center;justify-content:center;overflow:auto;padding:24px;background:#1b1b22;background-image:radial-gradient(#26262f 1px,transparent 1px);background-size:22px 22px;}
.canvas-wrap{transform-origin:center center;box-shadow:0 18px 60px rgba(0,0,0,.5);}
.inspector{background:#101015;border-left:1px solid #23232b;overflow-y:auto;padding:16px;scrollbar-gutter:stable;}
.inspector h3{margin:0 0 4px;font-size:13px;text-transform:uppercase;letter-spacing:.08em;color:#9a9aa6;}
.inspector .typetag{display:inline-block;background:#22222b;border:1px solid #34343f;border-radius:6px;padding:3px 9px;font-size:11px;color:#6C5CE7;font-weight:700;margin-bottom:14px;text-transform:uppercase;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:12px;color:#a7a7b2;margin-bottom:5px;font-weight:600;}
.field input[type=text],.field textarea,select.sel{width:100%;background:#1b1b22;border:1px solid #34343f;border-radius:8px;color:#fff;padding:9px 11px;font-size:13.5px;font-family:inherit;resize:vertical;}
.field textarea{min-height:70px;line-height:1.5;}
.field .hint{font-size:11px;color:#71717e;margin-top:4px;}
.chk{display:flex;align-items:center;gap:9px;font-size:13px;color:#cfcfd6;margin:10px 0;cursor:pointer;}
.chk input{width:16px;height:16px;accent-color:#6C5CE7;}
.divider{height:1px;background:#23232b;margin:16px 0;}
.muted{color:#71717e;font-size:12px;line-height:1.5;}
.glabel{font-size:10.5px;text-transform:uppercase;letter-spacing:.07em;color:#7e7e8c;margin:15px 0 7px;display:flex;justify-content:space-between;align-items:center;}
.glabel b{color:#6C5CE7;font-size:11.5px;}
.gridpos{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.wbtns{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.gridpos button,.seg button,.wbtns button{background:#1b1b22;border:1px solid #34343f;color:#c4c4ce;border-radius:8px;padding:9px 6px;font-size:11.5px;cursor:pointer;font-weight:600;text-align:center;}
.gridpos button:hover,.seg button:hover,.wbtns button:hover{background:#26262f;}
.gridpos button.on,.seg button.on,.wbtns button.on{background:#6C5CE7;border-color:#6C5CE7;color:#fff;}
.swrow{display:flex;gap:8px;flex-wrap:wrap;}
.sw{width:30px;height:30px;border-radius:7px;cursor:pointer;border:2px solid #2c2c36;position:relative;overflow:hidden;}
.sw.on{outline:2px solid #6C5CE7;outline-offset:2px;}
input[type=range]{width:100%;accent-color:#6C5CE7;height:18px;cursor:pointer;}
.sectionhead{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:10px 0;border-top:1px solid #23232b;margin-top:14px;}
.sectionhead h4{margin:0;font-size:14px;color:#fff;display:flex;gap:8px;align-items:center;}
.sectionhead .chev{color:#7e7e8c;transition:.2s;}
.sectionhead.closed .chev{transform:rotate(-90deg);}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#6C5CE7;color:#fff;padding:11px 20px;border-radius:10px;font-size:13.5px;font-weight:600;opacity:0;transition:.25s;pointer-events:none;z-index:99;}
.toast.show{opacity:1;}
#exportHost{position:fixed;left:-99999px;top:0;}

/* scrollbars harmonizadas */
*{scrollbar-width:thin;scrollbar-color:#33333f transparent;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#30303c;border-radius:10px;border:2px solid transparent;background-clip:padding-box;}
::-webkit-scrollbar-thumb:hover{background:#43434f;border:2px solid transparent;background-clip:padding-box;}
.rail::-webkit-scrollbar-thumb{background:#2a2a34;border:2px solid transparent;background-clip:padding-box;}
.stage::-webkit-scrollbar-thumb{background:#34343f;border:2px solid transparent;background-clip:padding-box;}
::-webkit-scrollbar-corner{background:transparent;}
.slide .bgimg{position:absolute;top:0;left:0;z-index:0;}
.dropzone{border:2px dashed #34343f;border-radius:12px;padding:24px 12px;text-align:center;color:#7e7e8c;cursor:pointer;margin:10px 0;font-size:13px;transition:.15s;}
.dropzone:hover,.dropzone.over{border-color:#6C5CE7;color:#aaa;background:#16161d;}
.dropzone .dzi{font-size:24px;margin-bottom:6px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin:4px 0 6px;}
.chip{background:#1b1b22;border:1px solid #34343f;color:#cfcfd6;border-radius:7px;padding:6px 10px;font-size:12.5px;cursor:pointer;}
.chip:hover{background:#26262f;}
.chip.on{background:#6C5CE7;border-color:#6C5CE7;color:#fff;}
.btn.on{background:#6C5CE7;border-color:#6C5CE7;color:#fff;}
.cpattern{position:absolute;inset:0;z-index:1;pointer-events:none;}
.slide .bgshade{z-index:2;}
.slide .content{z-index:5;}
.slide .handle{z-index:6;}
.cmark{position:absolute;z-index:6;font-family:var(--f-mono);color:inherit;white-space:nowrap;}
.slide.has-bg .cmark{color:#fff;}
.cmark .cwrap{display:inline-flex;gap:10px;align-items:center;}
.cglass{background:rgba(255,255,255,.14);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.3);border-radius:999px;padding:10px 20px;}
.cborder{border:2px solid currentColor;border-radius:999px;padding:8px 18px;}
.cdots{position:absolute;left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:12px;color:var(--accent);}
.cdot{width:14px;height:14px;border-radius:50%;background:currentColor;opacity:.32;}
.cdot.on{opacity:1;}
.clogo{position:absolute;z-index:7;max-width:240px;max-height:120px;object-fit:contain;}
.iconrow{display:flex;gap:6px;flex-wrap:wrap;}
.ibtn{width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:#1b1b22;border:1px solid #34343f;color:#cfcfd6;border-radius:8px;cursor:pointer;}
.ibtn:hover{background:#26262f;}
.ibtn.on{background:#6C5CE7;border-color:#6C5CE7;color:#fff;}
.colorrow{display:flex;gap:8px;align-items:center;}
.colorrow input[type=color]{width:46px;height:38px;border:1px solid #34343f;border-radius:8px;background:none;cursor:pointer;padding:0;}
.hexin{flex:1;}
.cornersgrid{display:flex;flex-direction:column;gap:8px;}
.cornercell{display:flex;gap:6px;align-items:center;}
.ctog{flex:0 0 54px;text-align:center;background:#1b1b22;border:1px solid #34343f;color:#9a9aa6;border-radius:7px;padding:7px 9px;font-size:10.5px;font-weight:700;cursor:pointer;}
.ctog.on{background:#6C5CE7;border-color:#6C5CE7;color:#fff;}
.cinp{flex:1;min-width:0;background:#1b1b22;border:1px solid #34343f;border-radius:7px;color:#fff;padding:7px 8px;font-size:12px;}
.tokhint{margin-top:7px;font-size:10.5px;opacity:.8;}
.tokhint b{color:#9a8fe8;font-weight:600;}
.uimi{vertical-align:middle;flex:0 0 auto;}
.dzi .uimi{vertical-align:middle;}
.slide .cardcontent{display:flex;flex-direction:column;gap:34px;width:100%;max-width:100%;align-items:flex-start;}
.tweetcard{background:#fff;color:#0f1419;border-radius:30px;padding:44px;box-shadow:0 18px 55px rgba(0,0,0,.22);width:100%;max-width:98%;box-sizing:border-box;}
.tweetcard *{box-sizing:border-box;}
.tw-head{display:flex;align-items:center;gap:18px;margin-bottom:24px;}
.tw-av{width:84px;height:84px;border-radius:50%;background:var(--accent);flex:0 0 auto;display:flex;align-items:center;justify-content:center;color:#fff;font-family:var(--f-display);font-size:42px;overflow:hidden;}
.tw-av img{width:100%;height:100%;object-fit:cover;}
.tw-id{min-width:0;}
.tw-name{font-family:var(--f-body);font-weight:700;font-size:34px;color:#0f1419;display:flex;align-items:center;gap:8px;}
.tw-badge{color:#1d9bf0;flex:0 0 auto;}
.tw-handle{font-size:28px;color:#536471;}
.tw-text{font-family:var(--f-body);font-size:40px;line-height:1.35;color:#0f1419;white-space:pre-wrap;}
.tw-text b{color:var(--accent);font-weight:600;}
.tw-img{margin-top:26px;border-radius:22px;overflow:hidden;border:1px solid #eaeaea;}
.tw-img img{width:100%;display:block;object-fit:cover;max-height:420px;}
.tw-metrics{display:flex;gap:44px;margin-top:30px;color:#536471;font-size:28px;font-family:var(--f-body);flex-wrap:wrap;}
.tw-metrics span{display:inline-flex;align-items:center;gap:12px;}
.notacard{display:flex;gap:26px;background:rgba(0,0,0,.05);border-left:6px solid var(--accent);border-radius:20px;padding:42px;width:100%;max-width:98%;box-sizing:border-box;align-items:flex-start;}
.slide.has-bg .notacard{background:rgba(255,255,255,.12);}
.notacard .nota-ic{flex:0 0 auto;width:70px;height:70px;border-radius:18px;background:var(--accent);color:var(--bg);display:flex;align-items:center;justify-content:center;}
.notacard .nota-tt{font-family:var(--f-body);font-weight:800;font-size:40px;line-height:1.18;margin-bottom:14px;color:var(--fg);}
.slide.has-bg .notacard .nota-tt{color:#fff;}
.notacard .nota-tx{font-size:34px;line-height:1.42;color:var(--muted);}
.slide.has-bg .notacard .nota-tx{color:#e8e8e8;}
.notacard .nota-tt b{color:var(--accent);}
</style>
</head>
<body>
<div id="app">
  <header>
    <span class="brand">CAROUSEL <b>STUDIO</b></span>
    <span class="sep"></span>
    <button class="btn" id="importBtn"><svg class="uimi" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Importar JSON</button>
    <input type="file" id="fileIn" accept="application/json,.json" style="display:none">
    <button class="btn" id="exportJsonBtn"><svg class="uimi" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2zM17 21v-8H7v8M7 3v5h8"/></svg>Salvar JSON</button>
    <span class="sep"></span>
    <span class="swatch">Acento <input type="color" id="cAccent"></span>
    <span class="swatch">Fundo <input type="color" id="cBg"></span>
    <span class="swatch">Texto <input type="color" id="cFg"></span>
    <span class="swatch">Respiro <input type="color" id="cCream"></span>
    <span class="grow"></span>
    <button class="btn primary" id="exportBtn"><svg class="uimi" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>Exportar ZIP</button>
  </header>
  <div class="main">
    <aside class="rail" id="rail"></aside>
    <section class="stage"><div class="canvas-wrap" id="canvasWrap"></div></section>
    <aside class="inspector" id="inspector"></aside>
  </div>
</div>
<div class="toast" id="toast"></div>
<div id="exportHost"></div>
<script id="deck-data" type="application/json"></script>
<script>
const KITS = {
  "editorial":     {disp:"Anton", body:"Inter", mono:"JetBrains Mono", serif:"Instrument Serif",
                    g:"Anton&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1"},

  "clean-sans":    {disp:"Manrope", body:"Manrope", mono:"DM Mono", serif:"Manrope",

const FORMATS = {"4:5":[1080,1350],"retrato":[1080,1350],"1:1":[1080,1080],"quadrado":[1080,1080],"9:16":[1080,1920],"stories":[1080,1920],"reels":[1080,1920]};
const FONT_OPTIONS = [
  ["Inter","Inter:wght@100..900"],["Anton","Anton"],["Space Grotesk","Space+Grotesk:wght@300..700"],
  ["Archivo","Archivo:wght@100..900"],["Manrope","Manrope:wght@200..800"],["Montserrat","Montserrat:wght@100..900"],
  ["Poppins","Poppins:wght@100;200;300;400;500;600;700;800;900"],["Oswald","Oswald:wght@200..700"],["Bebas Neue","Bebas+Neue"],

  ["Red Hat Display","Red+Hat+Display:wght@300..900"],["Karla","Karla:wght@300..800"]
];
const FONT_MAP = Object.fromEntries(FONT_OPTIONS);
const loadedFonts = new Set();
function loadFont(name){
  if(!name||loadedFonts.has(name))return;
  const gf=FONT_MAP[name]; if(!gf)return; loadedFonts.add(name);
  const l=document.createElement('link'); l.rel='stylesheet';
  l.href="https://fonts.googleapis.com/css2?family="+gf+"&display=swap"; document.head.appendChild(l);
}
const SWATCHES=["#FFFFFF","#E6E6E6","#3A3A3A","#FFD400","#FF4D4D","#2D7DFF","#1FBF59","#FF7A1A","#B06CFF","#FF5FA2","#13B0A5","#111111"];
const _defaultData = {
  "kit":"editorial","formato":"4:5",
  "paleta":{"bg":"#E9E1D2","fg":"#1B1714","muted":"#6E6357","accent":"#BE4D2E","surface":"#1B1714","cream":"#F7F2E8"},
  "handle":"@helioarreche",
  "slides":[
    {"tipo":"capa","ghost":"01","kicker":"GUIA DO PRODUTO","titulo":"Claude Cowork: a IA que faz o trabalho","sub":"O que é, como começar e 7 formas de usar hoje."},
    {"tipo":"passo","ghost":"01","titulo":"A maioria das IAs só conversa","corpo":"Você pergunta no chat, recebe a resposta — e transformar isso num deck, doc ou planilha ainda é com você."},

function decorate(e,s,idx,total){
  const g=ensureGlobal();
  const isCapa=s.tipo==='capa',isCta=s.tipo==='cta',isLast=idx===total-1;
  const ps=patternStyle(s.pattern);
  if(ps){const p=document.createElement('div');p.className='cpattern';p.style.backgroundImage=ps[0];p.style.backgroundSize=ps[1];e.insertBefore(p,e.firstChild);}
  const ostyle = s.overlayStyle || ((s.bg_uri||(data.infinite&&data.infiniteUri))?'base':'none');
  const grad=overlayGradient(ostyle);
  if(grad){const sh=document.createElement('div');sh.className='bgshade';sh.style.background=grad;sh.style.opacity=(s.overlayOpacity==null?100:s.overlayOpacity)/100;e.insertBefore(sh,e.firstChild);}

  if(g.showCorners){
    ['se','sd','ie','id'].forEach(code=>{
      if(isLast && code==='id' && (g.lastDir||g.lastIcon!=='none'))return;
      if(isLast && code==='ie' && g.lastEsq)return;
      const cc=g.corners[code]||{};
      let inner=(cc.on&&cc.text)?tok(cc.text):'';
      if(code==='id'){const ic=iconSvg(g.cornerIcon,fs);if(ic)inner='<span class="cwrap">'+inner+ic+'</span>';}

    if(g.lastDir||ic)badge('id','<span class="cwrap">'+esc(g.lastDir||'')+ic+'</span>');

  if(g.dots && total>1){

    e.appendChild(d);
  }
  if(g.logoUri && g.logoScope!=='none' && g.logoPos!=='none'){
    const show=g.logoScope==='all'||(g.logoScope==='slide1'&&idx===0);
    if(show){const im=document.createElement('img');im.className='clogo';im.src=g.logoUri;const ins=Math.max(48,inset-12);

      else if(g.logoPos==='ie'){im.style.bottom=ins+'px';im.style.left=ins+'px';}
      else {im.style.bottom=ins+'px';im.style.right=ins+'px';}
      e.appendChild(im);}
  }
}

  paste.onclick=async()=>{try{const items=await navigator.clipboard.read();for(const it of items){const t=it.types.find(x=>x.startsWith('image/'));if(t){const b=await it.getType(t);rf(b);return;}}toast('Nenhuma imagem na área de transferência');}catch(e){toast('Permita o acesso à área de transferência');}};

function renderInspector(){
  const insp=$('#inspector');insp.innerHTML='';
  const s=data.slides[current];
  insp.appendChild(el('h3',null,`Slide ${current+1} de ${data.slides.length}`));
  insp.appendChild(el('span','typetag',esc(s.tipo)));
  const tsel=el('div','field');tsel.appendChild(el('label',null,'Tipo do slide'));
  tsel.appendChild(selOf([['capa','Capa'],['passo','Passo'],['insight','Citação'],['lista','Lista'],['stat','Número / Stat'],['cta','CTA'],['tweet','Tweet / Post'],['nota','Nota / Aviso']],s.tipo,v=>{s.tipo=v;delete s.fx;renderMain();renderRail();renderInspector();}));
  insp.appendChild(tsel);
  const acts=el('div','seg');acts.style.gridTemplateColumns='1fr 1fr 1fr';
  const bAdd=el('button','btn','+ Slide');const bDup=el('button','btn','Duplicar');const bDel=el('button','btn','Remover');
  bAdd.onclick=()=>{data.slides.splice(current+1,0,{tipo:'passo',titulo:'Novo slide',corpo:''});current++;renderAll();};
  bDup.onclick=()=>{data.slides.splice(current+1,0,JSON.parse(JSON.stringify(s)));current++;renderAll();};
  bDel.onclick=()=>{if(data.slides.length<=1){toast('Precisa de pelo menos 1 slide');return;}data.slides.splice(current,1);current=Math.max(0,current-1);renderAll();};
  acts.appendChild(bAdd);acts.appendChild(bDup);acts.appendChild(bDel);insp.appendChild(acts);
  insp.appendChild(el('div','divider'));
  const upd=()=>{renderMain();renderRail();};
  const set=k=>v=>{s[k]=v;upd();};
  if(s.tipo==='capa'){
    insp.appendChild(field('Kicker (rótulo)',s.kicker,set('kicker')));
    insp.appendChild(field('Título',s.titulo,set('titulo'),'',true));
    insp.appendChild(field('Subtítulo',s.sub,set('sub'),'',true));
  } else if(s.tipo==='passo'){
    insp.appendChild(field('Título',s.titulo,set('titulo'),'',true));
    insp.appendChild(field('Corpo',s.corpo,set('corpo'),'',true));
  } else if(s.tipo==='insight'){
    insp.appendChild(field('Frase',s.texto,set('texto'),'',true));
    insp.appendChild(field('Fonte / atribuição',s.fonte,set('fonte')));
  } else if(s.tipo==='lista'){
    insp.appendChild(field('Título',s.titulo,set('titulo'),'',true));
    insp.appendChild(field('Itens (um por linha)',(s.itens||[]).join('\n'),v=>{s.itens=v.split('\n').filter(x=>x.trim()!=='');upd();},'Cada linha vira um item com seta.',true));
  } else if(s.tipo==='stat'){
    insp.appendChild(field('Número / destaque',s.numero,set('numero'),'ex.: 90min, 3x, +200'));
    insp.appendChild(field('Rótulo',s.rotulo,set('rotulo')));
    insp.appendChild(field('Corpo',s.corpo,set('corpo'),'',true));
  } else if(s.tipo==='cta'){
    insp.appendChild(field('Título',s.titulo,set('titulo'),'',true));
    insp.appendChild(field('Botão (ação)',s.acao,set('acao')));
    insp.appendChild(field('Subtítulo',s.sub,set('sub'),'',true));
  } else if(s.tipo==='tweet'){
    insp.appendChild(field('Headline (título)',s.titulo,set('titulo'),'',true));
    insp.appendChild(field('Subtítulo',s.sub,set('sub'),'',true));
    insp.appendChild(field('Autor',s.autor==null?'Claude':s.autor,set('autor')));
    insp.appendChild(field('@ handle',s.handle==null?'@claudeai':s.handle,set('handle')));
    insp.appendChild(chk('Selo verificado',s.verificado!==false,v=>{s.verificado=v;upd();}));
    insp.appendChild(field('Texto do tweet',s.texto,set('texto'),'Use **palavra** pra realçar na cor de acento.',true));
    insp.appendChild(glabel('Métricas (deixe vazio pra esconder)'));
    insp.appendChild(field('Curtidas',s.likes,set('likes'),'ex.: 1,8k'));
    insp.appendChild(field('Retweets',s.rts,set('rts')));
    insp.appendChild(field('Respostas',s.replies,set('replies')));
    insp.appendChild(field('Views',s.views,set('views')));
    insp.appendChild(glabel('Imagem dentro do tweet'));
    const ti=el('div','seg');ti.style.gridTemplateColumns='1fr 1fr';const tu=el('button','btn','Enviar');const tc=el('button','btn','Remover');ti.appendChild(tu);ti.appendChild(tc);insp.appendChild(ti);
    tu.onclick=()=>pickImg(u=>{s.img=u;upd();});tc.onclick=()=>{delete s.img;upd();};
    insp.appendChild(glabel('Avatar (opcional)'));
    const ai=el('div','seg');ai.style.gridTemplateColumns='1fr 1fr';const au=el('button','btn','Enviar');const ac=el('button','btn','Remover');ai.appendChild(au);ai.appendChild(ac);insp.appendChild(ai);
    au.onclick=()=>pickImg(u=>{s.avatar=u;upd();});ac.onclick=()=>{delete s.avatar;upd();};
  } else if(s.tipo==='nota'){
    insp.appendChild(field('Headline (título)',s.titulo,set('titulo'),'',true));
    insp.appendChild(field('Subtítulo',s.sub,set('sub'),'',true));
    insp.appendChild(glabel('Ícone do card'));
    insp.appendChild(cardIconPicker(s.icone||'lock',v=>{s.icone=v;upd();}));
    insp.appendChild(field('Título do card',s.cardTitulo,set('cardTitulo'),'Use **palavra** pra realçar.',true));
    insp.appendChild(field('Texto do card',s.cardTexto,set('cardTexto'),'',true));
  }
  capaStylePanel(insp,s,upd);
  wordHighlightPanel(insp,s,upd);
  if(s.tipo!=='cta'){ insp.appendChild(chk('Mostrar número gigante de fundo', !!s.ghost, v=>{s.ghost=v?String(current+1).padStart(2,'0'):undefined;upd();})); }
  if(s.tipo!=='capa'&&s.tipo!=='cta'){ insp.appendChild(chk('Slide de respiro (fundo claro)', !!s.breather, v=>{s.breather=v||undefined;upd();})); }
  insp.appendChild(el('div','divider'));
  bgPanel(insp,s);
  sombraPanel(insp,s);
  fundoPanel(insp,s);
  insp.appendChild(el('div','divider'));
  insp.appendChild(el('h3',null,'Geral'));
  insp.appendChild(field('Handle (@) — usado no token {handle}',data.handle,v=>{data.handle=v;upd();}));
  insp.appendChild(el('p','muted','Kit: <b style="color:#cfcfd6">'+esc(data.kit)+'</b> · Formato: '+esc(data.formato||'4:5')));
  globalStylePanel(insp);
  logoBadgePanel(insp);
}

function renderAll(){applyFonts();applyPalette();renderMain();renderRail();renderInspector();}
$('#cAccent').addEventListener('input',e=>{data.paleta.accent=e.target.value;applyPalette();renderMain();renderRail();});
$('#cBg').addEventListener('input',e=>{data.paleta.bg=e.target.value;applyPalette();renderMain();renderRail();});
$('#cFg').addEventListener('input',e=>{data.paleta.fg=e.target.value;applyPalette();renderMain();renderRail();});
$('#cCream').addEventListener('input',e=>{data.paleta.cream=e.target.value;applyPalette();renderMain();renderRail();});
$('#importBtn').onclick=()=>$('#fileIn').click();
$('#fileIn').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=ev=>{try{const j=JSON.parse(ev.target.result);if(!j.slides||!Array.isArray(j.slides))throw 0;
    data=j; if(!data.paleta)data.paleta={}; if(!data.kit)data.kit='editorial'; if(!data.formato)data.formato='4:5';
    current=0; renderAll(); toast('Carrossel importado: '+data.slides.length+' slides');
  }catch(err){toast('JSON inválido — use um slides.json da habilidade');}};
  r.readAsText(f); e.target.value='';
});
$('#exportJsonBtn').onclick=()=>{
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=el('a');a.download='slides.json';a.href=URL.createObjectURL(blob);a.click();toast('slides.json salvo');
};
async function fetchToDataURL(url){const res=await fetch(url,{mode:'cors'});const blob=await res.blob();return await new Promise((ok,err)=>{const r=new FileReader();r.onload=()=>ok(r.result);r.onerror=err;r.readAsDataURL(blob);});}
function waitImgs(node){
  const imgs=[].slice.call(node.querySelectorAll('img'));
  return Promise.all(imgs.map(im=>(im.complete&&im.naturalWidth)?Promise.resolve():new Promise(res=>{
    const done=()=>res();im.addEventListener('load',done,{once:true});im.addEventListener('error',done,{once:true});setTimeout(done,5000);
  })));
}
$('#exportBtn').onclick=async function(){
  const btn=this;btn.disabled=true;const old=btn.textContent;
  const [W,H]=dims();const total=data.slides.length;const host=$('#exportHost');
  applyFonts(); try{ if(document.fonts&&document.fonts.ready) await document.fonts.ready; }catch(e){}
  const useZip=(typeof JSZip!=='undefined');
  const zip=useZip?new JSZip():null;
  let ok=0,fail=0;
  try{
    if(data.infinite&&data.infiniteUri&&/^https?:/i.test(data.infiniteUri)){try{data.infiniteUri=await fetchToDataURL(data.infiniteUri);}catch(e){}}
    for(let i=0;i<total;i++){
      btn.textContent='Renderizando '+(i+1)+'/'+total+'…';
      const sl=data.slides[i];
      if(sl.bg_uri&&/^https?:/i.test(sl.bg_uri)){try{sl.bg_uri=await fetchToDataURL(sl.bg_uri);}catch(e){}}
      host.innerHTML='';const node=buildSlide(data.slides[i],i,total);host.appendChild(node);
      await waitImgs(node);
      await new Promise(r=>setTimeout(r,90));
      try{
        const canvas=await html2canvas(node,{width:W,height:H,scale:2,backgroundColor:null,useCORS:true,allowTaint:false,imageTimeout:8000,logging:false});
        const durl=canvas.toDataURL('image/png');const name='slide-'+String(i+1).padStart(2,'0')+'.png';
        if(useZip){zip.file(name,durl.split(',')[1],{base64:true});}
        else{const a=el('a');a.download=name;a.href=durl;a.click();await new Promise(r=>setTimeout(r,250));}
        ok++;
      }catch(err){fail++;console.error('Falha no slide '+(i+1),err);}
    }
  }finally{ host.innerHTML=''; }
  if(useZip&&ok>0){
    btn.textContent='Compactando…';
    let blob=null; try{blob=await zip.generateAsync({type:'blob'});}catch(e){console.error(e);}
    if(blob){
      const fname='carrossel-'+new Date().toISOString().slice(0,10)+'.zip';
      let saved=false;
      if(window.showSaveFilePicker){
        try{
          const handle=await window.showSaveFilePicker({suggestedName:fname,types:[{description:'Arquivo ZIP',accept:{'application/zip':['.zip']}}]});
          const w=await handle.createWritable();await w.write(blob);await w.close();saved=true;
        }catch(err){ if(err&&err.name==='AbortError'){btn.textContent=old;btn.disabled=false;toast('Exportação cancelada');return;} }
      }
      if(!saved){const a=el('a');a.download=fname;a.href=URL.createObjectURL(blob);a.click();}
    }
  }
  btn.textContent=old;btn.disabled=false;
  toast(fail?('Exportados '+ok+' de '+total+' (alguns falharam — veja o console)'):(useZip?('ZIP com '+ok+' PNGs ✓'):(ok+' PNGs exportados ✓')));
};

renderAll();
